<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Transcribe Audio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div>
          <div class="title">Transcribe Audio</div>
          <div class="subtitle">
            Upload an audio file, get a transcript and its mel spectrogram.
          </div>
        </div>
        <div class="badge dot" id="statusBadge">Ready</div>
      </header>

      <div class="grid">
        <section class="panel">
          <div class="section-title">Input</div>
          <div class="control-row">
            <label class="file-input">
              <input type="file" id="audioFile" accept="audio/*" />
              <span>Choose Audio File</span>
            </label>
            <button class="btn" id="sendBtn">Transcribe</button>
          </div>

          <hr style="margin: 20px 0" />
          <div class="control-row">
            <button class="btn outline" id="start">Start Recording</button>
            <button class="btn outline" id="stop">Stop Recording</button>
            <audio id="player" controls></audio>
            <button class="btn" id="transcribeRecordingBtn" disabled>
              Transcribe
            </button>
          </div>
          <br />
          <div class="status" id="status"></div>
        </section>

        <section class="panel">
          <div class="section-title">Transcript</div>
          <div id="transcript" class="transcript"></div>
        </section>
      </div>

      <section class="panel" style="margin-top: 16px">
        <div class="section-title">Voice Cloning (F5-TTS)</div>
        <textarea
          id="ttsText"
          rows="3"
          placeholder="Enter text to synthesize..."
        ></textarea>
        <div class="helper">
          Provide 1 to 2 sentences for the clone to speak.
        </div>
        <div class="control-row" style="margin-top: 12px">
          <label class="file-input">
            <input type="file" id="refVoice" accept="audio/*" />
            <span>Choose Reference Voice</span>
          </label>
          <button class="btn" id="speakBtn">Generate Voice</button>
        </div>
        <audio
          id="ttsPlayer"
          controls
          style="display: none; margin-top: 12px"
        ></audio>
      </section>

      <section class="panel" style="margin-top: 16px">
        <div class="section-title">Mel Spectrogram</div>
        <div class="spectrogram">
          <img id="mel" alt="Mel Spectrogram" style="display: none" />
        </div>
      </section>
    </div>
  </body>

  <script src="/static/app.js" defer></script>
</html>
